<!DOCTYPE html>
<html>
<head>
  <title>URL Shortener</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .success { color: green; }
    .error { color: red; }
    .warning { color: orange; }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #007bff;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SHORTENER -->
  <div class="card">
    <h2>URL Shortener</h2>

    <input id="urlInput" placeholder="Enter URL" />
    <button onclick="shorten()">Shorten</button>

    <p class="warning">⚠️ Max 5 URLs per minute allowed</p>

    <p id="message"></p>
  </div>

  <!-- TOP URLS -->
  <div class="card">
    <h2>Top 10 URLs</h2>
    <button onclick="loadTop()">Load</button>
    <table id="topTable"></table>
  </div>


</div>

<script>

// SHORTEN
async function shorten() {
  const url = document.getElementById("urlInput").value;
  const msg = document.getElementById("message");

  msg.innerHTML = "";

  if (!url) {
    msg.innerHTML = "Please enter a URL";
    msg.className = "error";
    return;
  }

  try {
    const res = await fetch("/shorten", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ originalUrl: url })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = data.message;
      msg.className = "error";
      return;
    }

    msg.innerHTML = `
      Short URL: <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>
    `;
    msg.className = "success";

  } catch (err) {
    msg.innerHTML = "Cannot connect to server";
    msg.className = "error";
  }
}


// TOP URLS
async function loadTop() {
  const table = document.getElementById("topTable");

  const res = await fetch("/top");
  const data = await res.json();

  table.innerHTML = `
    <tr>
      <th>Short</th>
      <th>Original</th>
      <th>Clicks</th>
    </tr>
  `;

  data.forEach(u => {
    table.innerHTML += `
      <tr>
        <td>${u.shortCode}</td>
        <td>${u.originalUrl}</td>
        <td>${u.clicks}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
